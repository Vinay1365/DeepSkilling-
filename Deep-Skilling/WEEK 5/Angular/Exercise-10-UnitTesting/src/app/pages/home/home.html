<div class="home-container">
  <h1>{{ portalName }}</h1>

  <app-notification></app-notification>
  
  <p class="description">
    Manage your academic journey, view course offerings, track your enrollment status, and check your grades in one centralized location.
  </p>

  <div class="enrollment-section">
    <button class="enroll-btn" [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
    <p *ngIf="message" class="enroll-message">{{ message }}</p>
  </div>

  <div class="search-section">
    <label for="search">Search Courses:</label>
    <input id="search" type="text" [(ngModel)]="searchTerm" placeholder="Type to search...">
    <p class="search-indicator" *ngIf="searchTerm">Searching for: <strong>{{ searchTerm }}</strong></p>
  </div>
  
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-value">{{ coursesCount }}</span>
      <span class="stat-label">Courses Available</span>
    </div>
    <div class="stat-card">
      <span class="stat-value">3</span>
      <span class="stat-label">Enrolled</span>
    </div>
    <div class="stat-card">
      <span class="stat-value">3.8</span>
      <span class="stat-label">GPA</span>
    </div>
  </div>
</div>
