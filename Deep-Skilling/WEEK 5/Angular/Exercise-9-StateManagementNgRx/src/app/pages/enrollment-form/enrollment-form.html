<div class="form-container">
  <h2>Student Course Enrollment Request</h2>

  <div *ngIf="submitted" class="success-message">
    Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" novalidate>
    <!-- Student Name -->
    <div class="form-group">
      <label for="studentName">Student Name *</label>
      <input 
        type="text" 
        id="studentName" 
        name="studentName" 
        [(ngModel)]="studentName" 
        #nameCtrl="ngModel" 
        required 
        minlength="3" 
        class="form-control"
        placeholder="Enter your full name">
      <div *ngIf="nameCtrl.touched && nameCtrl.errors" class="error-text">
        <span *ngIf="nameCtrl.errors['required']">Name is required.</span>
        <span *ngIf="nameCtrl.errors['minlength']">Name must be at least 3 characters.</span>
      </div>
    </div>

    <!-- Student Email -->
    <div class="form-group">
      <label for="studentEmail">Email Address *</label>
      <input 
        type="email" 
        id="studentEmail" 
        name="studentEmail" 
        [(ngModel)]="studentEmail" 
        #emailCtrl="ngModel" 
        required 
        email 
        class="form-control"
        placeholder="student@example.com">
      <div *ngIf="emailCtrl.touched && emailCtrl.errors" class="error-text">
        <span *ngIf="emailCtrl.errors['required']">Email is required.</span>
        <span *ngIf="emailCtrl.errors['email']">Please enter a valid email address.</span>
      </div>
    </div>

    <!-- Course ID -->
    <div class="form-group">
      <label for="courseId">Course ID *</label>
      <input 
        type="number" 
        id="courseId" 
        name="courseId" 
        [(ngModel)]="courseId" 
        #courseCtrl="ngModel" 
        required 
        class="form-control"
        placeholder="e.g. 101">
      <div *ngIf="courseCtrl.touched && courseCtrl.errors" class="error-text">
        <span *ngIf="courseCtrl.errors['required']">Course ID is required.</span>
      </div>
    </div>

    <!-- Preferred Semester -->
    <div class="form-group">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" name="preferredSemester" [(ngModel)]="preferredSemester" class="form-control">
        <option value="Odd">Odd Semester</option>
        <option value="Even">Even Semester</option>
      </select>
    </div>

    <!-- Terms & Conditions -->
    <div class="form-group checkbox-group">
      <label>
        <input 
          type="checkbox" 
          name="agreeToTerms" 
          [(ngModel)]="agreeToTerms" 
          #termsCtrl="ngModel" 
          required>
        I agree to the terms and enrollment policies *
      </label>
      <div *ngIf="termsCtrl.touched && termsCtrl.errors" class="error-text">
        <span *ngIf="termsCtrl.errors['required']">You must agree to the terms before submitting.</span>
      </div>
    </div>

    <!-- Buttons -->
    <div class="button-group">
      <button type="submit" class="btn btn-primary" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" class="btn btn-secondary" (click)="onReset(enrollForm)">Reset</button>
    </div>
  </form>
</div>
